<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Bible Story — A Journey Through Time</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c0392b">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  #splash {
    position: fixed; inset: 0; z-index: 999;
    background: linear-gradient(180deg, #eaf4ff 0%, #fdf9f1 45%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.5s ease;
  }
  #splash img { width: 96px; height: 96px; animation: splashPulse 1.1s ease-in-out infinite; }
  #splash p { font-family: 'Baloo 2', sans-serif; font-weight: 700; color: #6b4a2f; margin-top: 14px; font-size: 1rem; letter-spacing: 0.02em; }
  @keyframes splashPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  #splash.hide { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<div id="splash">
  <img src="logo-512.png" alt="The Bible Story logo">
  <p>The Bible Story</p>
</div>

<div class="bg-decor" aria-hidden="true">
  <img class="bg-icon" id="bgIconA">
  <img class="bg-icon" id="bgIconB">
</div>
<div class="mood-wash" id="moodWash"></div>

<header class="top-bar">
  <h1>📖 The Bible Story <span>— A Journey Through Time</span></h1>
  <div class="progress-wrap">
    <div class="progress-label"><span id="exploredCount">0</span> / 6 eras explored</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</header>

<main>
  <div class="road-viewport" id="roadViewport">
    <svg class="road-path" id="roadPath" preserveAspectRatio="none"></svg>
    <div class="stations" id="stations"></div>
  </div>

  <div class="nav-controls">
    <button id="prevBtn" class="nav-btn" aria-label="Previous era">◀ Prev</button>
    <div class="dots" id="dots"></div>
    <button id="nextBtn" class="nav-btn" aria-label="Next era">Next ▶</button>
  </div>
</main>

<div class="overlay" id="overlay"></div>

<section class="detail-panel" id="detailPanel">
  <button class="close-btn" id="closeBtn" aria-label="Close">✕</button>
  <div class="detail-banner-wrap">
    <img class="detail-banner" id="detailBanner" alt="">
    <div class="detail-banner-fade"></div>
  </div>
  <p class="image-credit" id="imageCredit"></p>
  <div class="detail-header" id="detailHeader">
    <div class="detail-icon" id="detailIcon"></div>
    <div>
      <h2 id="detailTitle"></h2>
      <div class="detail-dates" id="detailDates"></div>
    </div>
  </div>
  <p class="detail-summary" id="detailSummary"></p>
  <p class="tap-hint">👉 Tap a card to meet the person in the story!</p>
  <div class="event-cards" id="eventCards"></div>
</section>

<div class="overlay overlay-2" id="charOverlay"></div>

<section class="character-modal" id="characterModal">
  <button class="close-btn" id="charCloseBtn" aria-label="Close">✕</button>
  <div class="character-avatar" id="charAvatar"></div>
  <h2 class="character-name" id="charName"></h2>
  <p class="character-story" id="charStory"></p>
  <div id="charFullBioWrap"></div>
</section>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
